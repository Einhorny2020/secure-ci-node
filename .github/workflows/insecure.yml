name: Pipeline volontairement vulnérable

on:
  workflow_dispatch:

permissions:
    contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Installation des dépendances
        run: |
          npm install

      - name: Vérifier la présence du secret
        env:
            DEMO_SECRET: ${{ secrets.DEMO_SECRET }}
        run: |
             if [ -z "$DEMO_SECRET" ]; then
                echo "Le secret est absent."
                exit 1
             fi
             echo "Le secret est bien disponible pour cette étape."
      - name: Construction Docker
        run: |
          docker build -t secure-ci-node:test .

      - name: Fin du pipeline
        run: |
          echo "Pipeline terminé."