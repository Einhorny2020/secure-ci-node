name: Préparation du pipeline DevSecOps

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: devsecops-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Tests applicatifs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Exécuter les tests
        run: npm test

  infrastructure_security:
    name: Sécurité Infrastructure as Code

    needs:
      - test

    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Scanner les manifestes Kubernetes
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: infrastructure/kubernetes
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"


  build:
    name: Build et contrôle fictif
    needs:
      - test
      - infrastructure_security

    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Construire l’image Docker
        run: |
          docker build \
            -t secure-ci-node:${{ github.sha }} \
            .

      - name: Préparer les futurs contrôles de sécurité
        run: |
          echo "Démarrage de l'analyse de sécurité..."
          echo "Analyse SAST simulée..."
          sleep 2
          echo "Analyse SCA simulée..."
          sleep 2
          echo "Analyse des secrets simulée..."
          sleep 2
          echo "Analyse de l'image simulée..."
          sleep 2
          echo "Aucune vulnérabilité bloquante et contrôle IaC Conforme."
          exit 0

  publish:
    name: Publication simulée
    needs:
      - test
      - infrastructure_security
      - build

    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    steps:
      - name: Simuler la publication
        run: |
          echo "Les tests sont conformes."
          echo "Le manifeste Kubernetes est conforme."
          echo "L'image pourrait maintenant être publiée."

