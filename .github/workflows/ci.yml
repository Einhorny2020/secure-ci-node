name: CI Secure Node

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Installation et tests
    runs-on: ubuntu-latest

    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Afficher les versions
        run: |
          node --version
          npm --version

      - name: Installer les dépendances
        run: npm ci

      - name: Exécuter les tests
        run: npm test

      - name: Construire l’image Docker
        run: docker build -t secure-ci-node:${{ github.sha }} .
